<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Arena Showcase</title>
    <meta name="description" content="A beautiful gallery to preview and use images from Code and Design Arenas.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="app-background">
        <div class="blur-blob blob-1"></div>
        <div class="blur-blob blob-2"></div>
    </div>
    
    <header class="header">
        <div class="container header-inner">
            <h1 class="logo">
                <i class="ph-fill ph-aperture"></i> Visual<span>Arena</span>
            </h1>
            <div class="controls">
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
                    <i class="ph ph-sun"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="tabs-container">
            <nav class="tabs">
                <button class="tab-btn active" data-target="code-arena">
                    <i class="ph ph-code"></i>
                    <span>Code Arena</span>
                    <span class="badge" id="code-count">0</span>
                </button>
                <button class="tab-btn" data-target="design-arena">
                    <i class="ph ph-paint-brush"></i>
                    <span>Design Arena</span>
                    <span class="badge" id="design-count">0</span>
                </button>
                <div class="tab-indicator"></div>
            </nav>
        </div>

        <section class="gallery-wrapper">
            <div id="code-arena" class="gallery-grid active"></div>
            <div id="design-arena" class="gallery-grid"></div>
        </section>
    </main>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox" aria-hidden="true">
        <div class="lightbox-overlay"></div>
        <div class="lightbox-content-wrapper">
            <button class="lightbox-close icon-btn" aria-label="Close Lightbox">
                <i class="ph ph-x"></i>
            </button>
            <div class="lightbox-image-container">
                <img id="lightbox-img" src="" alt="Full preview">
            </div>
            <div class="lightbox-footer">
                <div class="image-info">
                    <h3 id="lightbox-title" class="image-title">Filename.png</h3>
                    <p id="lightbox-size" class="image-meta">0 MB</p>
                </div>
                <div class="lightbox-actions">
                    <a id="lightbox-download" href="" download class="btn btn-primary">
                        <i class="ph ph-download-simple"></i> Download
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
